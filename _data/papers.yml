 - title: "Why Do Supply Disruptions Lead to Inflation (While Demand Booms Do Not)? Survey Evidence from the COVID Pandemic"
   coauthors:
   - "Thomas Kohler, Bochum University of Applied Sciences"
   - "Jean-Paul L'Huillier, Brandeis University"
   - "Gregory Phelan, Williams College"
   abstract: "Firms tend to justify price increases as necessary to cover rising costs. Changes in consumer spending, instead, cannot serve as justification for price increases. We analyze how this asymmetry affects the decomposition of inflation into supply and demand factors. We base our analysis on a model that explains shock-dependent pricing, and extend it by deriving a sufficient statistic for relative inflation contributions. Novel survey data on the price-setting of German firms at the reopening of the economy post-COVID provides direct evidence for calibrating the model. We find that supply shocks are responsible for most of the upward adjustment of prices."
   presentations: "EEA-ESEM (2023), SED (2025), VfS (2025), SED (2026, scheduled)"
   links:
     - name: "PDF"
       url: "/WorkingPapers/Covid_Pricing_Survey-May2026.pdf"
     - name: "SSRN"
       url: "https://ssrn.com/abstract=5104017"

 - title: "Fundamental Stock Price Cycles"
   abstract: "News shocks about higher future capital returns can explain stock price-booms and subsequent -busts in a two-asset, heterogeneous agent New Keynesian model. The portfolio choice between more liquid and less liquid forms of capital is key, as it allows for a time-varying illiquidity premium. The arrival of investment opportunities induces capital-rich households to hold more illiquid capital at a lower premium, in anticipation of higher future returns on it. The anticipated higher consumption risk due to less liquid portfolios increases the value of more liquid assets, like stocks. When capital returns mean-revert, capital-rich households rebalance their portfolios, which increases the illiquidity premium and causes stock prices to fall. Novel evidence from survey data on portfolio choices of capital-wealthy households during stock price boom-bust cycles supports the key mechanism of the model."
   presentations: "YES (Yale, 2022), MMF (2023), HeiTueHo (2024), EWMES (2024)"
   links:
     - name: "PDF"
       url: "/WorkingPapers/technews.pdf"

 - title: "Disaster Risk and Wealth Inequality"
   coauthors:
    - "Alexander Dietrich, Danmarks Nationalbank"
    - "Gernot Müller, University of Tuebingen"
   abstract: "The risk of disasters---whether natural, political, or financial---is reflected in GDP tail risk. Based on cross-country data, we first establish a robust link between GDP tail risk and wealth inequality. Next, to explain this pattern, we propose an incomplete markets model in which wealthier households tend to increase their savings in response to heightened tail risk, whereas lower-wealth households save less. This differential savings response exacerbates wealth inequality over time. Finally, using data from a survey-based randomized controlled trial (RCT), we corroborate the mechanism at the heart of the model: we establish a causal relationship between tail risk beliefs and household savings behavior, which systematically varies with wealth."
   presentations: "Danmarks Nationalbank Research Seminar (2024), VfS (2025), ifo Conference on Macroeconomics and Survey Data (2025), EWMES (2025), EAYE (2026, scheduled), T2M (2026, scheduled), NASM (2026, scheduled), BSE Summer Forum (2026, scheduled)"
