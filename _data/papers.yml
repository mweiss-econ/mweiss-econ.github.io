 - title: "Local Methods for Large Transfers"
   coauthors:
   - "Christian Bayer, University of Bonn"
   - "Ralph Luetticke, University of Tuebingen"
   - "Yannis Winkelmann, University of Tuebingen"
   - "Luigi-Maria Briglia, University of Tuebingen"
   abstract: "Bianchi and Kaplan (2026) show that linear methods can greatly overstate the effects of large fiscal transfers. The central object is the shift in the asset distribution after a transfer shock, particularly the fraction of households that cross the borrowing-constraint threshold. This is precisely what the distributional endogenous-grid method (DEGM) developed in Bayer et al. (2026) captures. We show that DEGM naturally extends to capture the nonlinear shift in the asset distribution with respect to transfer size. Our Nonlinear DEGM Update (NDU) iterates the distribution exactly for the first period or a short window of periods while maintaining first-order household policies. With a 10 percent transfer, impact output increases by 7 percent with the nonlinear solution, 20 percent with the linear solution, and 7 percent with our novel method at near-linear computational cost."
   links:
     - name: "PDF"
       url: "/WorkingPapers/large_transfers.pdf"
 
 - title: "An Endogenous Gridpoint Method for Distributional Dynamics"
   coauthors:
   - "Christian Bayer, University of Bonn"
   - "Ralph Luetticke, University of Tuebingen"
   - "Yannis Winkelmann, University of Tuebingen"
   abstract: "Modeling continuous choices in heterogeneous agent models as 'lotteries' over a discretized state space is standard practice (Young, 2010), but renders the distributional dynamics linear in optimal policies. We present a novel, simple method that captures nonlinearities and solves the distributional dynamics with interpolation instead of integration using the idea of an endogenous grid. Our approach solves for a stationary equilibrium as quickly as the lottery method for a given precision, outperforms it for linear dynamics, and accommodates nonlinear dynamics and aggregate risk. We demonstrate its efficacy by studying a model with aggregate investment risk with a third-order perturbation solution."
   journal_status: "published"
   journal: "Journal of Monetary Economics"
   year: "2026"
   links:
